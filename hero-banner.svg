  <text x="632" y="107" font-family="monospace" font-size="12" fill="#ff7300">const</text>
  <text x="684" y="107" font-family="monospace" font-size="12" fill="#ffffffcc">dev = {</text>
  <text x="632" y="127" font-family="monospace" font-size="11" fill="#ffffffaa">  name:</text>
  <text x="690" y="127" font-family="monospace" font-size="11" fill="#98c379">"Vivek"</text><text x="733" y="127" font-family="monospace" font-size="11" fill="#ffffff66">,</text>
